<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмінка | Текстильний бутік</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <h2>Boutique<br>Admin</h2>
        <button class="nav-btn active" data-tab="add-section">🛍️ Додати</button>
        <button class="nav-btn" data-tab="list-section">📦 Товари</button>
    </nav>

    <main class="content">
        <section id="add-section" class="section active">
            <div class="card">
                <h1 id="form-title">Новий товар</h1>
                
                <form id="add-product-form">
                    
                    <div class="type-toggle">
                        <label>
                            <input type="radio" name="product_type" value="single" checked>
                            ✨ Один розмір
                        </label>
                        <label>
                            <input type="radio" name="product_type" value="variable">
                            📦 Є варіації (Євро, тощо)
                        </label>
                    </div>

                    <input type="text" id="title" placeholder="Назва товару (напр. Постіль 'Ніжність')" required>
                    
                    <select id="category">
                        <option value="postil">Постільна білизна</option>
                        <option value="rushnyky">Рушники</option>
                        <option value="pledy">Пледи</option>
                        <option value="dekor">Декор</option>
                    </select>

                    <input type="text" id="sku" placeholder="Артикул (залиште пустим для автогенерації)">

                    <input type="text" id="material" placeholder="Матеріал (напр. Сатин, 100% бавовна)">
                    
                    <textarea id="description" placeholder="Загальний опис товару"></textarea>

                    <div id="variations-container" style="margin-bottom: 25px;"></div>
                    
                    <button type="button" id="add-var-btn" class="action-btn secondary-btn" style="display: none; margin-bottom: 25px;">+ Додати ще одну варіацію</button>

                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: 600; margin-bottom: 10px; display: block;">Фотографія:</label>
                        <input type="file" id="image-file" accept="image/*" style="padding: 10px;">
                    </div>

                    <label style="display: flex; align-items: center; gap: 12px; font-weight: 600; cursor: pointer; margin-bottom: 25px; padding: 15px; background: #F8F9FA; border-radius: 16px;">
                        <input type="checkbox" id="in-stock" checked style="width: 24px; height: 24px; margin: 0; accent-color: #FF477E;">
                        Товар є в наявності
                    </label>

                    <button type="submit" id="submit-btn" class="action-btn">Зберегти товар</button>
                    <button type="button" id="cancel-edit-btn" class="action-btn secondary-btn" style="display: none;">Скасувати редагування</button>
                </form>
                <div id="status-message" style="margin-top: 20px; font-weight: bold; text-align: center;"></div>
            </div>
        </section>

        <section id="list-section" class="section">
            <h1 style="font-size: 28px; margin-bottom: 30px; color: #2D3436; font-weight: 800;">Ваші товари</h1>
            <div id="products-list">
                <p>Завантаження...</p>
            </div>
        </section>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
